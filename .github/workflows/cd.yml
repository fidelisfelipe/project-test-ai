name: CD — Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying commit ${{ github.sha }} to staging"
          echo "Image: ghcr.io/${{ github.repository }}/flight-monitor-app:${{ github.sha }}"

  smoke-tests-staging:
    name: Smoke Tests on Staging
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run smoke tests on staging
        uses: ./.github/workflows/smoke-tests.yml
        with:
          app_url: ${{ vars.STAGING_URL }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: smoke-tests-staging
    environment:
      name: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying commit ${{ github.sha }} to production"
          echo "Image: ghcr.io/${{ github.repository }}/flight-monitor-app:${{ github.sha }}"
