name: CD — Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying commit ${{ github.sha }} to staging"
          echo "Image: ghcr.io/${{ github.repository }}/flight-monitor-app:${{ github.sha }}"

  smoke-tests-staging:
    name: Smoke Tests on Staging
    runs-on: ubuntu-latest
    needs: deploy-staging
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Run smoke tests on staging
        run: mvn test -P smoke-only -Dapp.base.url=${{ vars.STAGING_URL }} -pl flight-monitor-app

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: smoke-tests-staging
    environment:
      name: production
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying commit ${{ github.sha }} to production"
          echo "Image: ghcr.io/${{ github.repository }}/flight-monitor-app:${{ github.sha }}"
