spring:
  application:
    name: flight-monitor-admin
  security:
    user:
      name: ${ADMIN_USERNAME:admin}
      # ADMIN_PASSWORD is required — the application will fail to start if not provided.
      # Set it via environment variable or secrets manager before deploying.
      password: ${ADMIN_PASSWORD}

de:
  codecentric:
    boot:
      admin:
        ui:
          title: "Flight Monitor — Admin"

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    de.codecentric: INFO
    com.flightmonitor: INFO
