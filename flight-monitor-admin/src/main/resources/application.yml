spring:
  application:
    name: flight-monitor-admin
  security:
    user:
      name: admin
      password: admin

de:
  codecentric:
    boot:
      admin:
        ui:
          title: "Flight Monitor — Admin"

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

logging:
  level:
    de.codecentric: INFO
    com.flightmonitor: INFO
