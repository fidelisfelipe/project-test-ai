spring:
  profiles:
    active: aggregator
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.pulsar.PulsarAutoConfiguration

flight:
  aggregator:
    enabled: true
    sources:
      - serpapi
      - kiwi
    timeout-seconds: 10
    deduplicate-by-flight-number: true
    max-results-per-source: 20

serpapi:
  api-key: ${SERPAPI_API_KEY:}
  currency: BRL
  language: pt-br

kiwi:
  api-key: ${KIWI_API_KEY:}
  partner: ${KIWI_PARTNER:picky}
  currency: BRL
  locale: pt-BR
  base-url: https://tequila-api.kiwi.com
