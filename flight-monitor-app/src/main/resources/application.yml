spring:
  application:
    name: flight-monitor-app
  datasource:
    url: jdbc:h2:file:./data/flightdb;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  h2:
    console:
      enabled: false
      path: /h2-console
  boot:
    admin:
      client:
        url: ${ADMIN_SERVER_URL:http://localhost:8081}
        instance:
          metadata:
            tags:
              environment: dev
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

amadeus:
  api:
    key: ${AMADEUS_API_KEY:test-key}
    secret: ${AMADEUS_API_SECRET:test-secret}
    host: ${AMADEUS_HOST:test}

flight:
  monitor:
    default-currency: EUR
    max-results: 20
    cache-ttl-minutes: 5
    alert:
      check-interval-minutes: 30
      email-enabled: ${ALERT_EMAIL_ENABLED:false}
  aggregator:
    enabled: false
    sources:
      - amadeus
    timeout-seconds: 10
    deduplicate-by-flight-number: true
    max-results-per-source: 20

server:
  port: 8080
  compression:
    enabled: true
  http2:
    enabled: true
  tomcat:
    threads:
      max: 200
      min-spare: 20
