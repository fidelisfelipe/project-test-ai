<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price History - Flight Monitor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="bg-dark text-light" data-bs-theme="dark">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-airplane-fill me-2 text-warning"></i>Flight Monitor
        </a>
    </div>
</nav>
<main class="container my-4">
    <h4 class="mb-3"><i class="bi bi-graph-up me-2"></i>Price History</h4>
    <form th:action="@{/flights/history}" method="get" class="row g-2 mb-4">
        <div class="col-auto">
            <input type="text" class="form-control" name="origin" placeholder="Origin (e.g. BSB)"
                   th:value="${origin}" pattern="[A-Z]{3}" maxlength="3" style="text-transform:uppercase;">
        </div>
        <div class="col-auto">
            <input type="text" class="form-control" name="destination" placeholder="Destination (e.g. LIS)"
                   th:value="${destination}" pattern="[A-Z]{3}" maxlength="3" style="text-transform:uppercase;">
        </div>
        <div class="col-auto">
            <select class="form-select" name="days">
                <option value="7">Last 7 days</option>
                <option value="30" selected>Last 30 days</option>
                <option value="90">Last 90 days</option>
            </select>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-warning">Show History</button>
        </div>
    </form>

    <div th:if="${history != null and !history.isEmpty()}">
        <canvas id="priceChart" height="100"></canvas>
        <script th:inline="javascript">
            const labels = /*[[${history.![recordedAt.toString()]}]]*/ [];
            const prices = /*[[${history.![avgPrice]}]]*/ [];
            const ctx = document.getElementById('priceChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Average Price (EUR)',
                        data: prices,
                        borderColor: '#ffc107',
                        backgroundColor: 'rgba(255,193,7,0.1)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#fff' } } },
                    scales: {
                        x: { ticks: { color: '#aaa' } },
                        y: { ticks: { color: '#aaa' } }
                    }
                }
            });
        </script>
    </div>
    <div th:if="${history == null or history.isEmpty()}" class="alert alert-info mt-3">
        No history data available for the selected route and period.
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</body>
</html>
