<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title ?: 'Flight Price Monitor'}">Flight Price Monitor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <th:block th:replace="${extraHead}"></th:block>
</head>
<body class="bg-dark text-light" data-bs-theme="dark">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-airplane-fill me-2 text-warning"></i>Flight Monitor
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/flights/search}">
                        <i class="bi bi-search me-1"></i>Search
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/flights/history}">
                        <i class="bi bi-graph-up me-1"></i>History
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/reports/dashboard}">
                        <i class="bi bi-bar-chart-fill me-1"></i>Reports
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/swagger-ui.html}" target="_blank">
                        <i class="bi bi-code-slash me-1"></i>API Docs
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container my-4">
    <th:block th:replace="${content}"></th:block>
</main>

<footer class="bg-black text-muted py-3 mt-5">
    <div class="container text-center">
        <small>&copy; 2024 Flight Price Monitor &mdash; Powered by Spring Boot 3 &amp; Java 21</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<th:block th:replace="${extraScripts}"></th:block>
</body>
</html>
