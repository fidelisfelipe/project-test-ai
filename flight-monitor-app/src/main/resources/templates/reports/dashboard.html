<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reports Dashboard - Flight Monitor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="bg-dark text-light" data-bs-theme="dark">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Flight Monitor</a>
    </div>
</nav>
<main class="container my-4">
    <h4 class="mb-3">Reports Dashboard</h4>
    <form th:action="@{/reports/dashboard}" method="get" class="row g-2 mb-4">
        <div class="col-md-2">
            <input type="text" class="form-control" name="origin" placeholder="Origin" maxlength="3" style="text-transform:uppercase;" th:value="${report?.origin()}">
        </div>
        <div class="col-md-2">
            <input type="text" class="form-control" name="destination" placeholder="Destination" maxlength="3" style="text-transform:uppercase;" th:value="${report?.destination()}">
        </div>
        <div class="col-md-3">
            <input type="date" class="form-control" name="startDate" th:value="${report?.startDate()}">
        </div>
        <div class="col-md-3">
            <input type="date" class="form-control" name="endDate" th:value="${report?.endDate()}">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-warning">Generate</button>
        </div>
    </form>

    <div th:if="${report != null}">
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card bg-success text-white text-center p-3">
                    <h6>Lowest Price</h6>
                    <h3 th:text="'EUR ' + ${report.lowestPrice()}">EUR 0</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-danger text-white text-center p-3">
                    <h6>Highest Price</h6>
                    <h3 th:text="'EUR ' + ${report.highestPrice()}">EUR 0</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-info text-white text-center p-3">
                    <h6>Average Price</h6>
                    <h3 th:text="'EUR ' + ${report.averagePrice()}">EUR 0</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-warning text-dark text-center p-3">
                    <h6>Trend</h6>
                    <h3 th:text="${report.priceTrend()}">STABLE</h3>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
