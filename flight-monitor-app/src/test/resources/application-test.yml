spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  boot:
    admin:
      client:
        enabled: false

amadeus:
  api:
    key: test-key
    secret: test-secret
    host: test

logging:
  level:
    com.flightmonitor: DEBUG
